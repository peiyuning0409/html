<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>煜宁科技极客空间 | 名片·游戏·全矩阵导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 10%, #0b0f1a, #010101);
            font-family: 'Inter', 'Segoe UI', 'Poppins', 'Orbitron', system-ui, monospace;
            padding: 1.8rem 1.5rem;
            position: relative;
            overflow-x: auto;
        }

        /* 增强动态科技网格 + 星河光晕 + 流光粒子 + 光晕动画 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                repeating-linear-gradient(0deg, rgba(0, 255, 255, 0.04) 0px, rgba(0, 255, 255, 0.04) 1px, transparent 1px, transparent 18px),
                repeating-linear-gradient(90deg, rgba(0, 255, 255, 0.04) 0px, rgba(0, 255, 255, 0.04) 1px, transparent 1px, transparent 18px),
                radial-gradient(circle at 80% 30%, rgba(0,180,255,0.15), transparent 60%);
            pointer-events: none;
            z-index: 0;
            animation: bgPulse 6s infinite alternate;
        }
        @keyframes bgPulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* 动态浮游粒子层 */
        .particle-field {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            background: rgba(0, 255, 255, 0.4);
            border-radius: 50%;
            box-shadow: 0 0 8px cyan;
            animation: floatParticle linear infinite;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) translateX(-20px); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-20vh) translateX(20px); opacity: 0; }
        }

        .master-container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            z-index: 10;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* ---------- 高级科技名片 ---------- */
        .tech-card {
            background: rgba(8, 18, 28, 0.65);
            backdrop-filter: blur(14px);
            border-radius: 2.5rem;
            border: 1px solid rgba(0, 255, 255, 0.5);
            box-shadow: 0 25px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,255,255,0.2) inset;
            transition: 0.3s;
            overflow: hidden;
            animation: auroraPulse 3s infinite ease-in-out;
        }
        .card-inner { padding: 2rem 2rem; display: flex; flex-direction: column; gap: 1.6rem; }
        .hero-section { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; border-bottom: 1px solid rgba(0,255,255,0.3); padding-bottom: 1rem; justify-content: space-between; }
        .hero-left { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
        .avatar-frame {
            width: 85px; height: 85px;
            background: linear-gradient(145deg, #0e1a24, #010a12);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 1px #0ff3;
        }
        .avatar-inner {
            width: 72px; height: 72px;
            background: radial-gradient(circle at 30% 30%, #0ff, #0055aa);
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.6rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 8px cyan;
        }
        .name-title h1 {
            font-size: 2.4rem;
            background: linear-gradient(135deg, #FFF, #7ff7ff, #2ccdff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .glow-tag {
            background: rgba(0,255,255,0.12);
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            color: #afffff;
            border: 0.5px solid cyan;
            display: inline-block;
        }
        .personal-collection-btn {
            background: rgba(0, 255, 255, 0.15);
            border: 1px solid cyan;
            border-radius: 60px;
            padding: 0.6rem 1.4rem;
            font-size: 0.9rem;
            font-weight: bold;
            font-family: 'Orbitron', monospace;
            color: #0ff;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 12px rgba(0,255,255,0.3);
        }
        .personal-collection-btn:hover {
            background: cyan;
            color: #000;
            box-shadow: 0 0 25px cyan;
            transform: scale(1.02);
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 1rem;
        }
        .info-item {
            background: rgba(0,20,30,0.5);
            border-radius: 1.5rem;
            padding: 0.9rem 1.2rem;
            border-left: 3px solid #0ff;
            transition: 0.2s;
        }
        .info-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #7bc5d0; }
        .info-value { font-size: 0.9rem; font-weight: 500; color: #eef5ff; word-break: break-all; font-family: monospace; }
        .status-bar {
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid rgba(0,255,255,0.3);
        }
        .bilibili-link {
            font-family: 'Orbitron', monospace;
            background: rgba(0, 150, 200, 0.2);
            padding: 4px 12px;
            border-radius: 40px;
            transition: 0.2s;
            border: 0.5px solid cyan;
        }
        .bilibili-link a {
            color: #aaffff;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        .bilibili-link:hover {
            background: rgba(0, 210, 255, 0.4);
            box-shadow: 0 0 8px cyan;
        }
        .action-links { display: flex; gap: 1rem; flex-wrap: wrap; }
